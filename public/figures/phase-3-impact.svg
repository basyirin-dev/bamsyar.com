<!-- SYSTEM: axis-stroke #3A3A3A -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <!-- Upward arrow (deceleration) -->
    <marker id="arrowGrey" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#A0A0A0" />
    </marker>
    <!-- Downward arrow (activation) -->
    <marker id="arrowCyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7EC8E3" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#0D0D0D" />

  <!-- Phase title & Trigger -->
  <text x="40" y="45" fill="#F2F2F2" font-size="22" font-weight="bold" font-family="'Segoe UI', Arial, sans-serif">
    PHASE 3 <tspan fill="#CCCCCC" font-weight="normal">— Intersection Activation Impact</tspan>
  </text>
  <text x="40" y="68" fill="#9A9A9A" font-size="14" font-family="'Segoe UI', Arial, sans-serif">
    Triggered: δ<tspan baseline-shift="sub" font-size="10">relative</tspan> > 0.65 in mastery domains
  </text>

  <!-- Legend / Glossary Block (Shared 4-row template) -->
  <rect x="560" y="25" width="220" height="100" fill="#111111" stroke="#3A3A3A" stroke-width="1" rx="4"/>
  <rect x="575" y="40" width="12" height="12" fill="#F4A823" rx="2"/>
  <text x="595" y="50" font-family="'Courier New', Courier, monospace" font-size="11" fill="#F2F2F2">δ Parametric depth</text>
  <rect x="575" y="60" width="12" height="12" fill="#264A7A" rx="2"/>
  <text x="595" y="70" font-family="'Courier New', Courier, monospace" font-size="11" fill="#F2F2F2">D* Delegation floor</text>
  <rect x="575" y="80" width="12" height="12" fill="#00FFFF" rx="2"/>
  <text x="595" y="90" font-family="'Courier New', Courier, monospace" font-size="11" fill="#F2F2F2">Ψ Intersection activation</text>
  <line x1="575" y1="105" x2="587" y2="105" stroke="#E8E8E8" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="595" y="109" font-family="'Courier New', Courier, monospace" font-size="11" fill="#F2F2F2">Δ(d,t) Frontier</text>

  <!-- Quantitative Grounding (State Snapshot Box) -->
  <rect x="40" y="255" width="220" height="90" rx="6" fill="#1A1A1A" stroke="#3A3A3A" stroke-width="1" />
  <text x="55" y="280" font-family="'Courier New', Courier, monospace" font-size="13" fill="#F4A823">δ<tspan baseline-shift="sub" font-size="10">relative</tspan> > 0.65</text>
  <text x="55" y="302" font-family="'Courier New', Courier, monospace" font-size="13" fill="#F4A823">σ → σ<tspan baseline-shift="sub" font-size="10">Ψ</tspan> (approaching)</text>
  <text x="55" y="324" font-family="'Courier New', Courier, monospace" font-size="13" fill="#F4A823">D* retracting</text>

  <!-- ===================== FLOW NODES ===================== -->
  <g id="flow-nodes">

    <!-- Top-Left Node (Deceleration) -->
    <rect x="150" y="120" width="220" height="80" rx="8" fill="#1A1A1A" stroke="#3A3A3A" stroke-width="1" />
    <text x="260" y="145" fill="#F2F2F2" font-size="14" font-family="'Segoe UI', Arial, sans-serif" text-anchor="middle">
      <tspan x="260" dy="0">Vertical bar growth</tspan>
      <tspan x="260" dy="1.4em">decelerates</tspan>
      <tspan x="260" dy="1.4em">(η decay)</tspan>
    </text>

    <!-- Top-Right Node (Frontier acceleration) -->
    <rect x="430" y="120" width="220" height="80" rx="8" fill="#1A1A1A" stroke="#3A3A3A" stroke-width="1" />
    <text x="540" y="145" fill="#F2F2F2" font-size="14" font-family="'Segoe UI', Arial, sans-serif" text-anchor="middle">
      <tspan x="540" dy="0">Frontier Δ(d,t)</tspan>
      <tspan x="540" dy="1.4em">accelerates —</tspan>
      <tspan x="540" dy="1.4em">gap persists</tspan>
    </text>

    <!-- Bottom-Left Node (Delegation retraction) -->
    <rect x="150" y="440" width="220" height="80" rx="8" fill="#1C3A5E" stroke="#2E5F9E" stroke-width="1" />
    <text x="260" y="475" fill="#F2F2F2" font-size="14" font-family="'Segoe UI', Arial, sans-serif" text-anchor="middle">
      <tspan x="260" dy="0">Delegation boundary</tspan>
      <tspan x="260" dy="1.4em">retracts strategically</tspan>
    </text>

    <!-- Bottom-Right Node (Intersection Reachable) -->
    <rect x="430" y="440" width="220" height="80" rx="8" fill="#1A1A1A" stroke="#7EC8E3" stroke-width="1" />
    <text x="540" y="465" fill="#F2F2F2" font-size="14" font-family="'Segoe UI', Arial, sans-serif" text-anchor="middle">
      <tspan x="540" dy="0">Ψ threshold θ<tspan baseline-shift="sub" font-size="0.7em">I</tspan></tspan>
      <tspan x="540" dy="1.4em">becomes reachable</tspan>
      <tspan x="540" dy="1.4em">at D2×D4</tspan>
    </text>

    <!-- Central Trigger Node -->
    <rect x="290" y="270" width="220" height="60" rx="12" fill="rgba(224, 82, 82, 0.9)" />
    <text x="400" y="306" fill="#FFFFFF" font-size="15" font-weight="700" font-family="'Segoe UI', Arial, sans-serif" text-anchor="middle">
      δ<tspan baseline-shift="sub" font-size="10">relative</tspan> > 0.65 in D2, D4
    </text>

  </g>

  <!-- ===================== FLOW EDGES (Drawn over edges of boxes) ===================== -->
  <g id="flow-edges">
    <!-- Upward paths (Deceleration effects) -->
    <path d="M 350 270 Q 260 270 260 206" fill="none" stroke="#A0A0A0" stroke-width="2.5" marker-end="url(#arrowGrey)" />
    <path d="M 450 270 Q 540 270 540 206" fill="none" stroke="#A0A0A0" stroke-width="2.5" marker-end="url(#arrowGrey)" />

    <!-- Downward paths (Activation effects) -->
    <path d="M 350 330 Q 260 330 260 434" fill="none" stroke="#7EC8E3" stroke-width="2.5" marker-end="url(#arrowCyan)" />
    <path d="M 450 330 Q 540 330 540 434" fill="none" stroke="#7EC8E3" stroke-width="2.5" marker-end="url(#arrowCyan)" />
  </g>

  <!-- ===================== CAPTION ===================== -->
  <rect x="100" y="555" width="600" height="44" fill="#111111" rx="4"/>
  <text x="400" y="581" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#9A9A9A" text-anchor="middle">
    Phase 3 marks the first moment where schema σ has structural consequence — Ψ becomes geometrically reachable.
  </text>

  <!-- Cross-phase orientation indicator (Phase 3 = 4th pip) -->
  <g transform="translate(400, 592)">
    <circle cx="-32" cy="0" r="4" fill="#3A3A3A" />
    <circle cx="-16" cy="0" r="4" fill="#3A3A3A" />
    <circle cx="0"   cy="0" r="4" fill="#3A3A3A" />
    <circle cx="16"  cy="0" r="4.5" fill="#F2F2F2" />
    <circle cx="32"  cy="0" r="4" fill="#3A3A3A" />
  </g>

</svg>
