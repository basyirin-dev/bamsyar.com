<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">

  <!-- Background -->
  <rect width="800" height="600" fill="#0D0D0D" />

  <!-- Phase header -->
  <text x="105" y="52" font-family="sans-serif" font-weight="bold" font-size="22" fill="#F2F2F2" letter-spacing="1">PHASE 0 — Random Initialization</text>
  <text x="105" y="76" font-family="sans-serif" font-size="13" fill="#9A9A9A">No training begun — uniform diffuse activations</text>

  <!-- Legend / Glossary Block (Shared 4-row template) -->
  <rect x="560" y="25" width="220" height="100" fill="#111111" stroke="#3A3A3A" stroke-width="1" rx="4"/>

  <!-- Row 1 -->
  <rect x="575" y="40" width="12" height="12" fill="#F4A823" rx="2"/>
  <text x="595" y="50" font-family="monospace" font-size="11" fill="#F2F2F2">δ Parametric depth</text>

  <!-- Row 2 -->
  <rect x="575" y="60" width="12" height="12" fill="#264A7A" rx="2"/>
  <text x="595" y="70" font-family="monospace" font-size="11" fill="#F2F2F2">𝒟* Delegation floor</text>

  <!-- Row 3 -->
  <rect x="575" y="80" width="12" height="12" fill="#00FFFF" rx="2"/>
  <text x="595" y="90" font-family="monospace" font-size="11" fill="#F2F2F2">Ψ Intersection activation</text>

  <!-- Row 4 -->
  <line x1="575" y1="105" x2="587" y2="105" stroke="#E8E8E8" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="595" y="109" font-family="monospace" font-size="11" fill="#F2F2F2">Δ(d,t) Frontier</text>

  <!-- Y-axis rotated label -->
  <text
    transform="rotate(-90)"
    x="-290" y="58"
    font-family="sans-serif" font-size="13" fill="#6B6B6B"
    text-anchor="middle">Parametric Depth (δ)</text>

  <!-- Y-axis tick marks and labels -->
  <line x1="95" y1="120" x2="103" y2="120" stroke="#3A3A3A" stroke-width="1.5"/>
  <text x="88" y="125" font-family="monospace" font-size="12" fill="#6B6B6B" text-anchor="end">1.0</text>

  <line x1="95" y1="188" x2="103" y2="188" stroke="#3A3A3A" stroke-width="1.5"/>
  <text x="88" y="193" font-family="monospace" font-size="12" fill="#6B6B6B" text-anchor="end">0.8</text>

  <line x1="95" y1="256" x2="103" y2="256" stroke="#3A3A3A" stroke-width="1.5"/>
  <text x="88" y="261" font-family="monospace" font-size="12" fill="#6B6B6B" text-anchor="end">0.6</text>

  <line x1="95" y1="324" x2="103" y2="324" stroke="#3A3A3A" stroke-width="1.5"/>
  <text x="88" y="329" font-family="monospace" font-size="12" fill="#6B6B6B" text-anchor="end">0.4</text>

  <line x1="95" y1="392" x2="103" y2="392" stroke="#3A3A3A" stroke-width="1.5"/>
  <text x="88" y="397" font-family="monospace" font-size="12" fill="#6B6B6B" text-anchor="end">0.2</text>

  <line x1="95" y1="460" x2="103" y2="460" stroke="#3A3A3A" stroke-width="1.5"/>
  <text x="88" y="465" font-family="monospace" font-size="12" fill="#6B6B6B" text-anchor="end">0.0</text>

  <!-- Axes -->
  <path d="M 103 120 L 103 460 L 720 460" fill="none" stroke="#3A3A3A" stroke-width="1.5"/>

  <!-- X-axis label -->
  <text x="411" y="520" font-family="sans-serif" font-size="13" fill="#6B6B6B" text-anchor="middle">Training Domains</text>

  <!-- Frontier dashed line -->
  <line x1="103" y1="133" x2="718" y2="133" stroke="#E8E8E8" stroke-width="1.5" stroke-dasharray="12,6"/>
  <text x="775" y="150" font-family="sans-serif" font-size="12" fill="#E8E8E8" text-anchor="end">Frontier Δ(d,t)</text>

  <!-- Mastery threshold dashed line -->
  <line x1="103" y1="256" x2="718" y2="256" stroke="#6B6B6B" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="775" y="270" font-family="sans-serif" font-size="12" fill="#6B6B6B" text-anchor="end">Mastery threshold</text>

  <!-- Delegation overlay (Layer 2) - Base bars removed for Phase 0. Full width and uniform rx="2". -->
  <g fill="#264A7A" fill-opacity="0.95">
    <rect x="128" y="430" width="68" height="30" rx="2" />
    <rect x="228" y="436" width="68" height="24" rx="2" />
    <!-- D3 Exemplar: Amber dashed border applied instead of a connector line -->
    <rect x="328" y="426" width="68" height="34" rx="2" stroke="#F4A823" stroke-width="1.5" stroke-dasharray="4,2" />
    <rect x="428" y="432" width="68" height="28" rx="2" />
    <rect x="528" y="428" width="68" height="32" rx="2" />
    <rect x="628" y="438" width="68" height="22" rx="2" />
  </g>

  <!-- Tooltip annotation replacing the base bars -->
  <text x="411" y="390" font-family="monospace" font-size="12" fill="#9A9A9A" text-anchor="middle">base depth ≈ 0, delegation = total</text>

  <!-- D3 Exemplar Label -->
  <text x="362" y="415" font-family="sans-serif" font-style="italic" font-size="11" fill="#F4A823" text-anchor="middle">highest noise</text>

  <!-- Domain labels -->
  <text x="162" y="482" font-family="monospace" font-size="13" fill="#9A9A9A" text-anchor="middle">D1</text>
  <text x="262" y="482" font-family="monospace" font-size="13" fill="#9A9A9A" text-anchor="middle">D2</text>
  <text x="362" y="482" font-family="monospace" font-size="13" fill="#9A9A9A" text-anchor="middle">D3</text>
  <text x="462" y="482" font-family="monospace" font-size="13" fill="#9A9A9A" text-anchor="middle">D4</text>
  <text x="562" y="482" font-family="monospace" font-size="13" fill="#9A9A9A" text-anchor="middle">D5</text>
  <text x="662" y="482" font-family="monospace" font-size="13" fill="#9A9A9A" text-anchor="middle">D6</text>

  <!-- Annotation box -->
  <rect x="385" y="140" width="310" height="114" fill="#1A1A1A" stroke="#3A3A3A" stroke-width="1" rx="6"/>
  <text x="400" y="165" font-family="monospace" font-size="13" fill="#F4A823">δ ≈ 0  (all domains)</text>
  <text x="400" y="189" font-family="monospace" font-size="13" fill="#F4A823">σ = 0  (no schema)</text>
  <text x="400" y="213" font-family="monospace" font-size="13" fill="#F4A823">𝒟* = 100% (full delegation)</text>
  <text x="400" y="237" font-family="monospace" font-size="13" fill="#F4A823">Ψ = 0  (no transfer)</text>

  <!-- Caption -->
  <rect x="103" y="535" width="615" height="44" fill="#111111" rx="4"/>
  <text x="411" y="553" font-family="sans-serif" font-size="12" fill="#9A9A9A" text-anchor="middle">Representations: surface statistical co-occurrence only</text>
  <text x="411" y="570" font-family="sans-serif" font-size="12" fill="#9A9A9A" text-anchor="middle">No domain structure · No schema · No transfer</text>

  <!-- Cross-phase orientation indicator (Phase 0 = 1st pip) -->
  <g transform="translate(411, 592)">
    <circle cx="-32" cy="0" r="4.5" fill="#F2F2F2" />
    <circle cx="-16" cy="0" r="4" fill="#3A3A3A" />
    <circle cx="0"   cy="0" r="4" fill="#3A3A3A" />
    <circle cx="16"  cy="0" r="4" fill="#3A3A3A" />
    <circle cx="32"  cy="0" r="4" fill="#3A3A3A" />
  </g>

</svg>
