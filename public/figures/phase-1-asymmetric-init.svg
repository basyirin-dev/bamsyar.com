<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">

  <!-- Background -->
  <rect width="800" height="600" fill="#0D0D0D" />

  <!-- Phase title -->
  <text x="40" y="45" fill="#F2F2F2" font-family="sans-serif" font-size="22" font-weight="bold">PHASE 1 — Early Specialization</text>
  <text x="40" y="68" fill="#9A9A9A" font-family="sans-serif" font-size="14">Triggered: first sustained depth investment in candidate domains</text>

  <!-- Legend / Glossary Block (Shared 4-row template) -->
  <rect x="560" y="25" width="220" height="100" fill="#111111" stroke="#3A3A3A" stroke-width="1" rx="4"/>
  <rect x="575" y="40" width="12" height="12" fill="#F4A823" rx="2"/>
  <text x="595" y="50" font-family="monospace" font-size="11" fill="#F2F2F2">δ Parametric depth</text>
  <rect x="575" y="60" width="12" height="12" fill="#264A7A" rx="2"/>
  <text x="595" y="70" font-family="monospace" font-size="11" fill="#F2F2F2">𝒟* Delegation floor</text>
  <rect x="575" y="80" width="12" height="12" fill="#00FFFF" rx="2"/>
  <text x="595" y="90" font-family="monospace" font-size="11" fill="#F2F2F2">Ψ Intersection activation</text>
  <line x1="575" y1="105" x2="587" y2="105" stroke="#E8E8E8" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="595" y="109" font-family="monospace" font-size="11" fill="#F2F2F2">Δ(d,t) Frontier</text>

  <!-- Y-axis label (rotated) -->
  <text x="-310" y="35" transform="rotate(-90)" fill="#6B6B6B" font-family="sans-serif" font-size="14" text-anchor="middle">Parametric Depth (δ)</text>

  <!-- Axes -->
  <line x1="100" y1="120" x2="100" y2="500" stroke="#3A3A3A" stroke-width="1.5" />
  <line x1="100" y1="500" x2="700" y2="500" stroke="#3A3A3A" stroke-width="1.5" />

  <!-- Y-axis ticks and labels -->
  <line x1="95" y1="500" x2="100" y2="500" stroke="#3A3A3A" stroke-width="1.5" />
  <text x="85" y="504" font-family="monospace" font-size="13" fill="#9A9A9A" text-anchor="end">0.0</text>

  <line x1="95" y1="424" x2="100" y2="424" stroke="#3A3A3A" stroke-width="1.5" />
  <text x="85" y="428" font-family="monospace" font-size="13" fill="#9A9A9A" text-anchor="end">0.2</text>

  <line x1="95" y1="348" x2="100" y2="348" stroke="#3A3A3A" stroke-width="1.5" />
  <text x="85" y="352" font-family="monospace" font-size="13" fill="#9A9A9A" text-anchor="end">0.4</text>

  <line x1="95" y1="272" x2="100" y2="272" stroke="#3A3A3A" stroke-width="1.5" />
  <text x="85" y="276" font-family="monospace" font-size="13" fill="#9A9A9A" text-anchor="end">0.6</text>

  <line x1="95" y1="196" x2="100" y2="196" stroke="#3A3A3A" stroke-width="1.5" />
  <text x="85" y="200" font-family="monospace" font-size="13" fill="#9A9A9A" text-anchor="end">0.8</text>

  <line x1="95" y1="120" x2="100" y2="120" stroke="#3A3A3A" stroke-width="1.5" />
  <text x="85" y="124" font-family="monospace" font-size="13" fill="#9A9A9A" text-anchor="end">1.0</text>

  <!-- Frontier dashed line -->
  <line x1="100" y1="133" x2="700" y2="133" stroke="#E8E8E8" stroke-width="1.5" stroke-dasharray="12,6" />
  <text x="710" y="137" font-family="sans-serif" font-size="12" fill="#E8E8E8">Frontier Δ(d,t)</text>

  <!-- Mastery threshold dashed line -->
  <line x1="100" y1="272" x2="700" y2="272" stroke="#6B6B6B" stroke-width="1.5" stroke-dasharray="8,4" />
  <rect x="106" y="264" width="120" height="16" fill="#0D0D0D" />
  <text x="108" y="276" font-family="sans-serif" font-size="12" fill="#6B6B6B" text-anchor="start">Mastery threshold</text>

  <!-- ===================== BARS ===================== -->
  <!-- Grey base bars (Layer 1) - Width 68px -->
  <g fill="#4A4A4A">
    <rect x="116" y="462" width="68" height="38" />  <!-- D1 -->
    <rect x="216" y="356" width="68" height="144" /> <!-- D2 -->
    <rect x="316" y="458" width="68" height="42" />  <!-- D3 -->
    <rect x="416" y="367" width="68" height="133" /> <!-- D4 -->
    <rect x="516" y="466" width="68" height="34" />  <!-- D5 -->
    <rect x="616" y="470" width="68" height="30" />  <!-- D6 -->
  </g>

  <!-- Higher contrast delegation overlay (Layer 2) - Width 52px (inset 8px from base bars) -->
  <g fill="#264A7A" fill-opacity="0.95">
    <rect x="124" y="462" width="52" height="38" />  <!-- D1 -->
    <rect x="224" y="356" width="52" height="144" /> <!-- D2 -->
    <rect x="324" y="458" width="52" height="42" />  <!-- D3 -->
    <rect x="424" y="367" width="52" height="133" /> <!-- D4 -->
    <rect x="524" y="466" width="52" height="34" />  <!-- D5 -->
    <rect x="624" y="470" width="52" height="30" />  <!-- D6 -->
  </g>

  <!-- Delegation boundary lines matching the inset overlays -->
  <g stroke="#2E5F9E" stroke-width="2" stroke-linecap="square">
    <line x1="124" y1="462" x2="176" y2="462"/>
    <line x1="224" y1="356" x2="276" y2="356"/>
    <line x1="324" y1="458" x2="376" y2="458"/>
    <line x1="424" y1="367" x2="476" y2="367"/>
    <line x1="524" y1="466" x2="576" y2="466"/>
    <line x1="624" y1="470" x2="676" y2="470"/>
  </g>

  <!-- ===================== DOMAIN LABELS ===================== -->
  <g stroke="#3A3A3A" stroke-width="1.5">
    <line x1="150" y1="500" x2="150" y2="505" />
    <line x1="250" y1="500" x2="250" y2="505" />
    <line x1="350" y1="500" x2="350" y2="505" />
    <line x1="450" y1="500" x2="450" y2="505" />
    <line x1="550" y1="500" x2="550" y2="505" />
    <line x1="650" y1="500" x2="650" y2="505" />
  </g>

  <g font-family="monospace" font-size="13" fill="#9A9A9A" text-anchor="middle">
    <text x="150" y="522">D1</text>
    <text x="250" y="522">D2</text>
    <text x="350" y="522">D3</text>
    <text x="450" y="522">D4</text>
    <text x="550" y="522">D5</text>
    <text x="650" y="522">D6</text>
  </g>

  <!-- X-axis label -->
  <text x="400" y="545" font-family="sans-serif" font-size="12" fill="#6B6B6B" text-anchor="middle">Training Domains</text>

  <!-- ===================== EVENT MARKERS ===================== -->
  <!-- D2 Event Marker (σ_critical) -->
  <g transform="translate(250, 355)">
    <line x1="-10" y1="-10" x2="-14" y2="-14" stroke="#E05252" stroke-width="1.5" />
    <line x1="10" y1="-10" x2="14" y2="-14" stroke="#E05252" stroke-width="1.5" />
    <line x1="-10" y1="10" x2="-14" y2="14" stroke="#E05252" stroke-width="1.5" />
    <line x1="10" y1="10" x2="14" y2="14" stroke="#E05252" stroke-width="1.5" />
    <circle cx="0" cy="0" r="9" fill="#E05252" />
    <text x="0" y="-19" font-family="monospace" font-size="11" font-weight="bold" fill="#E05252" text-anchor="middle">σ_critical</text>
  </g>

  <!-- D4 Event Marker (Approaching, reduced opacity) -->
  <g transform="translate(450, 366)" opacity="0.4">
    <line x1="-10" y1="-10" x2="-14" y2="-14" stroke="#E05252" stroke-width="1.5" />
    <line x1="10" y1="-10" x2="14" y2="-14" stroke="#E05252" stroke-width="1.5" />
    <line x1="-10" y1="10" x2="-14" y2="14" stroke="#E05252" stroke-width="1.5" />
    <line x1="10" y1="10" x2="14" y2="14" stroke="#E05252" stroke-width="1.5" />
    <circle cx="0" cy="0" r="9" fill="#E05252" />
    <text x="0" y="-19" font-family="monospace" font-size="11" font-weight="bold" fill="#E05252" text-anchor="middle">σ_critical</text>
  </g>

  <!-- ===================== ANNOTATION BOX ===================== -->
  <!-- Expanded height to 102 to include Ψ -->
  <rect x="490" y="148" width="290" height="102" rx="6" fill="#1A1A1A" stroke="#3A3A3A" stroke-width="1" />
  <text x="505" y="170" font-family="monospace" font-size="13" fill="#F4A823">δ growing in D2, D4</text>
  <text x="505" y="192" font-family="monospace" font-size="13" fill="#F4A823">σ = 0 (no schema)</text>
  <text x="505" y="214" font-family="monospace" font-size="13" fill="#F4A823">𝒟* = 100% (delegation persists)</text>
  <text x="505" y="236" font-family="monospace" font-size="13" fill="#F4A823">Ψ = 0  (no transfer)</text>

  <!-- Caption -->
  <rect x="100" y="555" width="600" height="44" fill="#111111" rx="4"/>
  <text x="400" y="573" font-family="sans-serif" font-size="12" fill="#9A9A9A" text-anchor="middle">Representations: category-level features emerging in D2, D4</text>
  <text x="400" y="590" font-family="sans-serif" font-size="12" fill="#9A9A9A" text-anchor="middle">Surface-dominant · Cross-domain transfer = 0</text>

  <!-- Cross-phase orientation indicator (Phase 1 = 2nd pip) -->
  <g transform="translate(400, 592)">
    <circle cx="-32" cy="0" r="4" fill="#3A3A3A" />
    <circle cx="-16" cy="0" r="4.5" fill="#F2F2F2" />
    <circle cx="0"   cy="0" r="4" fill="#3A3A3A" />
    <circle cx="16"  cy="0" r="4" fill="#3A3A3A" />
    <circle cx="32"  cy="0" r="4" fill="#3A3A3A" />
  </g>

</svg>
