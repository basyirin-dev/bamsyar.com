<!-- BAR t₁  —  EARLY TRAINING             -->
<!-- left=148  right=232  centre=190        -->
<!-- Δ=0.93→y=146  δ=0.52→y=285  D*=0.22→y=387 -->
<!-- ══════════════════════════════════════ -->

<!-- Outer frame (full domain 0 to Δ) -->
<rect x="148" y="146" width="84" height="316" fill="none" stroke="#3A3A3A" stroke-width="1" rx="2"/>

<!-- Zone: Unexplored (δ_A to Δ, y=146 h=139) -->
