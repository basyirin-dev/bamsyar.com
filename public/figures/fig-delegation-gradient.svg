<line x1="125" y1="387" x2="131" y2="387" stroke="#00FFFF" stroke-width="1.5"/>
<line x1="125" y1="309" x2="131" y2="309" stroke="#00FFFF" stroke-width="1.5"/>
<line x1="125" y1="241" x2="131" y2="241" stroke="#00FFFF" stroke-width="1.5"/>
<!-- Label: rotated -->
<text transform="rotate(-90, 115, 315)" x="115" y="319" font-family="monospace" font-size="10" fill="#00FFFF" text-anchor="middle">𝒟* rises</text>

<!-- ──────────────────────────────────── -->
<!-- Ω_AI BYPASS RISK CALLOUT            -->
<!-- Small annotation on the t1 bar      -->
<!-- ──────────────────────────────────── -->
<rect x="148" y="397" width="84" height="18" fill="none" stroke="#F4A823" stroke-width="0.8" stroke-dasharray="3,2" rx="2" opacity="0.55"/>
<text x="190" y="409" font-family="monospace" font-size="8" fill="#F4A823" fill-opacity="0.70" text-anchor="middle">
  Ω<tspan baseline-shift="sub" font-size="6">AI</tspan> risk if over-delegated
</text>

<!-- ──────────────────────────────────── -->
<!-- TIME LABELS + PROGRESSION ARROW     -->
<!-- ──────────────────────────────────── -->
<text x="190" y="479" font-family="monospace" font-size="13" fill="#9A9A9A" text-anchor="middle">t₁</text>
<text x="190" y="493" font-family="sans-serif" font-size="10" fill="#6B6B6B" text-anchor="middle">Early</text>
<text x="374" y="479" font-family="monospace" font-size="13" fill="#9A9A9A" text-anchor="middle">t₂</text>
<text x="374" y="493" font-family="sans-serif" font-size="10" fill="#6B6B6B" text-anchor="middle">Mid</text>
<text x="558" y="479" font-family="monospace" font-size="13" fill="#9A9A9A" text-anchor="middle">t₃</text>
<text x="558" y="493" font-family="sans-serif" font-size="10" fill="#6B6B6B" text-anchor="middle">Advanced</text>

