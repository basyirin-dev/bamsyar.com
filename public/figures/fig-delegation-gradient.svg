<!-- ──────────────────────────────────── -->
<line x1="232" y1="387" x2="332" y2="309" stroke="#00FFFF" stroke-width="1" stroke-dasharray="4,3" opacity="0.40"/>
<line x1="416" y1="309" x2="516" y2="241" stroke="#00FFFF" stroke-width="1" stroke-dasharray="4,3" opacity="0.40"/>

