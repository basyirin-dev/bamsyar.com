<!-- σ marker inside schema zone -->
<text x="190" y="341" font-family="monospace" font-size="16" fill="#00FFFF" fill-opacity="0.55" text-anchor="middle">σ</text>

<!-- Zone: AI-delegatable (0 to D*, y=387 h=75) -->
<rect x="149" y="387" width="82" height="75" fill="#264A7A" fill-opacity="0.88" rx="0"/>

<!-- D* boundary line (bold cyan) -->
<line x1="148" y1="387" x2="232" y2="387" stroke="#00FFFF" stroke-width="2.5"/>

<!-- δ_A line (amber dashed) -->
<line x1="148" y1="285" x2="232" y2="285" stroke="#F4A823" stroke-width="1.5" stroke-dasharray="5,3"/>

<!-- Δ line (E8E8E8 dashed) -->
<line x1="148" y1="146" x2="232" y2="146" stroke="#E8E8E8" stroke-width="1" stroke-dasharray="8,4"/>

<!-- Value labels (left of each D* line for the bracket, right of bar for δ/Δ) -->
<text x="240" y="290" font-family="monospace" font-size="9" fill="#F4A823">δ=0.52</text>
<text x="240" y="391" font-family="monospace" font-size="9" fill="#00FFFF">D*=0.22</text>

<!-- ══════════════════════════════════════ -->
<!-- BAR t₂  —  MID TRAINING               -->
<!-- left=332  right=416  centre=374        -->
