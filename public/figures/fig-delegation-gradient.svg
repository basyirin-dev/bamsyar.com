<path d="M 110 122 L 110 462 L 600 462" fill="none" stroke="#3A3A3A" stroke-width="1.5"/>

<text transform="rotate(-90)" x="-292" y="58" font-family="sans-serif" font-size="13" fill="#6B6B6B" text-anchor="middle">Knowledge Depth in Domain d</text>

