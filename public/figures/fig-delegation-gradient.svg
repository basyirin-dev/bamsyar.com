<text x="373" y="515" font-family="sans-serif" font-size="11" fill="#6B6B6B" text-anchor="middle">
  Training progression  ·  AI capability δ<tspan baseline-shift="sub" font-size="8">AI</tspan>(s,t) grows  ·  |𝒟*| expands
</text>

<!-- ──────────────────────────────────── -->
<!-- ANNOTATION BOX — FORMULA           -->
<!-- ──────────────────────────────────── -->
<rect x="118" y="521" width="565" height="30" fill="#1A1A1A" stroke="#3A3A3A" stroke-width="1" rx="6"/>
<text y="541" font-family="monospace" font-size="12">
<tspan x="135" fill="#F2F2F2">𝒟*(d,t) = { s ∈ d :  </tspan>
<tspan fill="#F4A823">δ<tspan baseline-shift="sub" font-size="8">AI</tspan>(s,t)</tspan>
<tspan fill="#F2F2F2">  ≥  </tspan>
<tspan fill="#F4A823">δ<tspan baseline-shift="sub" font-size="8">A</tspan>(s,t)</tspan>
<tspan fill="#F2F2F2">  }   →   rational to delegate s to AI</tspan>
</text>

<!-- ──────────────────────────────────── -->
<!-- CAPTION BAR                         -->
<!-- ──────────────────────────────────── -->
<rect x="30" y="556" width="740" height="34" fill="#111111" rx="4"/>
<text x="400" y="570" font-family="sans-serif" font-size="12" fill="#9A9A9A" text-anchor="middle">
  Schema-intensive zone (above D*) cannot be safely delegated — requires σ<tspan baseline-shift="sub" font-size="9">A</tspan> the AI does not possess
</text>
<text x="400" y="583" font-family="sans-serif" font-size="12" fill="#9A9A9A" text-anchor="middle">
  Over-delegation before σ<tspan baseline-shift="sub" font-size="9">critical</tspan> suppresses schema crystallisation — the Ω<tspan baseline-shift="sub" font-size="9">AI</tspan> bypass risk
</text>

