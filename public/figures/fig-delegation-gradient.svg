<text x="102" y="126" font-family="monospace" font-size="12" fill="#6B6B6B" text-anchor="end">1.0</text>
<line x1="105" y1="190" x2="113" y2="190" stroke="#3A3A3A" stroke-width="1.5"/>
<text x="102" y="194" font-family="monospace" font-size="12" fill="#6B6B6B" text-anchor="end">0.8</text>
<line x1="105" y1="258" x2="113" y2="258" stroke="#3A3A3A" stroke-width="1.5"/>
<text x="102" y="262" font-family="monospace" font-size="12" fill="#6B6B6B" text-anchor="end">0.6</text>
<line x1="105" y1="326" x2="113" y2="326" stroke="#3A3A3A" stroke-width="1.5"/>
<text x="102" y="330" font-family="monospace" font-size="12" fill="#6B6B6B" text-anchor="end">0.4</text>
<line x1="105" y1="394" x2="113" y2="394" stroke="#3A3A3A" stroke-width="1.5"/>
<text x="102" y="398" font-family="monospace" font-size="12" fill="#6B6B6B" text-anchor="end">0.2</text>
<line x1="105" y1="462" x2="113" y2="462" stroke="#3A3A3A" stroke-width="1.5"/>
<text x="102" y="466" font-family="monospace" font-size="12" fill="#6B6B6B" text-anchor="end">0.0</text>

