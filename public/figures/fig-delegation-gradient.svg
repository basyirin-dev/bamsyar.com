<text x="30" y="36" font-family="sans-serif" font-weight="bold" font-size="22" fill="#F2F2F2" letter-spacing="1">FIGURE 3 — The Delegation Gradient 𝒟*</text>
<text x="30" y="57" font-family="sans-serif" font-size="13" fill="#9A9A9A">D*(d,t) expands as AI capability grows — the boundary between delegatable and schema-intensive work rises</text>
<line x1="30" y1="67" x2="770" y2="67" stroke="#3A3A3A" stroke-width="1"/>

<!-- ──────────────────────────────────── -->
<!-- LEGEND — top-right, h=82, ends y=162 -->
