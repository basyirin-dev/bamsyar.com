<!-- D* line -->
<line x1="332" y1="309" x2="416" y2="309" stroke="#00FFFF" stroke-width="2.5"/>

<!-- δ_A line -->
<line x1="332" y1="224" x2="416" y2="224" stroke="#F4A823" stroke-width="1.5" stroke-dasharray="5,3"/>

<!-- Δ line -->
<line x1="332" y1="136" x2="416" y2="136" stroke="#E8E8E8" stroke-width="1" stroke-dasharray="8,4"/>

<text x="424" y="228" font-family="monospace" font-size="9" fill="#F4A823">δ=0.70</text>
<text x="424" y="313" font-family="monospace" font-size="9" fill="#00FFFF">D*=0.45</text>

<!-- ══════════════════════════════════════ -->
<!-- BAR t₃  —  ADVANCED TRAINING          -->
<!-- left=516  right=600  centre=558        -->
<!-- Δ=0.98→y=129  δ=0.84→y=176  D*=0.65→y=241 -->
<!-- ══════════════════════════════════════ -->

<rect x="516" y="129" width="84" height="333" fill="none" stroke="#3A3A3A" stroke-width="1" rx="2"/>

<!-- Unexplored (y=129 h=47) -->
