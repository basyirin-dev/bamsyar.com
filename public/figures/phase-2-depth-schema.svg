<!-- SYSTEM: axis-stroke #3A3A3A -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">

  <!-- Background -->
  <rect width="800" height="600" fill="#0D0D0D" />

  <defs>
    <!-- Depth acceleration gradient for mastery domains -->
    <linearGradient id="d2d4grad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#4A4A4A"/>
      <stop offset="55%" stop-color="#8B5E3C"/>
      <stop offset="85%" stop-color="#C47B2B"/>
      <stop offset="100%" stop-color="#E8940A"/>
    </linearGradient>
  </defs>

  <!-- Phase title -->
  <text x="40" y="45" fill="#F2F2F2" font-family="sans-serif" font-size="22" font-weight="bold">
    PHASE 2 <tspan fill="#CCCCCC" font-weight="normal">— Depth Acceleration and Schema Crystallization</tspan>
  </text>
  <text x="40" y="68" fill="#9A9A9A" font-family="sans-serif" font-size="14">
    Triggered: σ<tspan baseline-shift="sub" font-size="10">A</tspan>(d,t) > σ<tspan baseline-shift="sub" font-size="10">critical</tspan> in ≥1 mastery candidate
  </text>

  <!-- Legend / Glossary Block (Shared 4-row template) -->
  <rect x="560" y="153" width="220" height="100" fill="#111111" stroke="#3A3A3A" stroke-width="1" rx="4"/>
  <rect x="575" y="165" width="12" height="12" fill="#F4A823" rx="2"/>
  <text x="595" y="175" font-family="monospace" font-size="11" fill="#F2F2F2">δ Parametric depth</text>
  <rect x="575" y="185" width="12" height="12" fill="#264A7A" rx="2"/>
  <text x="595" y="195" font-family="monospace" font-size="11" fill="#F2F2F2">D* Delegation floor</text>
  <rect x="575" y="205" width="12" height="12" fill="#00FFFF" rx="2"/>
  <text x="595" y="215" font-family="monospace" font-size="11" fill="#F2F2F2">Ψ Intersection activation</text>
  <line x1="575" y1="235" x2="587" y2="235" stroke="#E8E8E8" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="595" y="240" font-family="monospace" font-size="11" fill="#F2F2F2">Δ(d,t) Frontier</text>

  <!-- Y-axis label (rotated) -->
  <text x="-310" y="35" transform="rotate(-90)" fill="#6B6B6B" font-family="sans-serif" font-size="14" text-anchor="middle">Parametric Depth (δ)</text>

  <!-- Axes -->
  <line x1="100" y1="120" x2="100" y2="500" stroke="#3A3A3A" stroke-width="1.5" />
  <line x1="100" y1="500" x2="700" y2="500" stroke="#3A3A3A" stroke-width="1.5" />

  <!-- Y-axis ticks and labels (0.0 - 1.0 scale) -->
  <line x1="95" y1="500" x2="100" y2="500" stroke="#3A3A3A" stroke-width="1.5" />
  <text x="85" y="504" font-family="monospace" font-size="13" fill="#9A9A9A" text-anchor="end">0.0</text>

  <line x1="95" y1="424" x2="100" y2="424" stroke="#3A3A3A" stroke-width="1.5" />
  <text x="85" y="428" font-family="monospace" font-size="13" fill="#9A9A9A" text-anchor="end">0.2</text>

  <line x1="95" y1="348" x2="100" y2="348" stroke="#3A3A3A" stroke-width="1.5" />
  <text x="85" y="352" font-family="monospace" font-size="13" fill="#9A9A9A" text-anchor="end">0.4</text>

  <line x1="95" y1="272" x2="100" y2="272" stroke="#3A3A3A" stroke-width="1.5" />
  <text x="85" y="276" font-family="monospace" font-size="13" fill="#9A9A9A" text-anchor="end">0.6</text>

  <line x1="95" y1="196" x2="100" y2="196" stroke="#3A3A3A" stroke-width="1.5" />
  <text x="85" y="200" font-family="monospace" font-size="13" fill="#9A9A9A" text-anchor="end">0.8</text>

  <line x1="95" y1="120" x2="100" y2="120" stroke="#3A3A3A" stroke-width="1.5" />
  <text x="85" y="124" font-family="monospace" font-size="13" fill="#9A9A9A" text-anchor="end">1.0</text>

  <!-- Frontier dashed line -->
  <line x1="100" y1="133" x2="700" y2="133" stroke="#E8E8E8" stroke-width="1.5" stroke-dasharray="12,6" />
  <text x="710" y="137" font-family="sans-serif" font-size="12" fill="#E8E8E8">Frontier Δ(d,t)</text>

  <!-- Mastery threshold dashed line -->
  <line x1="100" y1="272" x2="700" y2="272" stroke="#6B6B6B" stroke-width="1.5" stroke-dasharray="8,4" />
  <rect x="106" y="264" width="120" height="16" fill="#0D0D0D" />
  <text x="108" y="276" font-family="sans-serif" font-size="12" fill="#6B6B6B" text-anchor="start">Mastery threshold</text>

  <!-- ===================== BARS ===================== -->

  <!-- Grey base bars (Layer 1) - Width 68px -->
  <g fill="#4A4A4A">
    <rect x="116" y="416.4" width="68" height="83.6" />  <!-- D1 -->
    <rect x="316" y="401.2" width="68" height="98.8" />  <!-- D3 -->
    <rect x="516" y="424.0" width="68" height="76.0" />  <!-- D5 -->
    <rect x="616" y="416.4" width="68" height="83.6" />  <!-- D6 -->
  </g>

  <!-- Mastery candidate depth growth (Layer 1) -->
  <g fill="url(#d2d4grad)">
    <rect x="216" y="218.8" width="68" height="281.2" /> <!-- D2 -->
    <rect x="416" y="241.6" width="68" height="258.4" /> <!-- D4 -->
  </g>

  <!-- Higher contrast delegation overlay (Layer 2) - Width 52px (inset 8px from base bars) -->
  <g fill="#264A7A" fill-opacity="0.95">
    <rect x="124" y="428.9" width="52" height="71.1" />  <!-- D1: 0.85 of base -->
    <rect x="224" y="348.0" width="52" height="152.0" /> <!-- D2: mastery drop -->
    <rect x="324" y="416.0" width="52" height="84.0" />  <!-- D3: 0.85 of base -->
    <rect x="424" y="348.0" width="52" height="152.0" /> <!-- D4: mastery drop -->
    <rect x="524" y="435.4" width="52" height="64.6" />  <!-- D5: 0.85 of base -->
    <rect x="624" y="428.9" width="52" height="71.1" />  <!-- D6: 0.85 of base -->
  </g>

  <!-- Delegation boundary lines matching the inset overlays -->
  <g stroke="#2E5F9E" stroke-width="2" stroke-linecap="square">
    <line x1="124" y1="428.9" x2="176" y2="428.9"/>
    <line x1="224" y1="348.0" x2="276" y2="348.0"/>
    <line x1="324" y1="416.0" x2="376" y2="416.0"/>
    <line x1="424" y1="348.0" x2="476" y2="348.0"/>
    <line x1="524" y1="435.4" x2="576" y2="435.4"/>
    <line x1="624" y1="428.9" x2="676" y2="428.9"/>
  </g>

  <!-- ===================== DOMAIN LABELS ===================== -->
  <g stroke="#3A3A3A" stroke-width="1.5">
    <line x1="150" y1="500" x2="150" y2="505" />
    <line x1="250" y1="500" x2="250" y2="505" />
    <line x1="350" y1="500" x2="350" y2="505" />
    <line x1="450" y1="500" x2="450" y2="505" />
    <line x1="550" y1="500" x2="550" y2="505" />
    <line x1="650" y1="500" x2="650" y2="505" />
  </g>

  <g font-family="monospace" font-size="13" fill="#9A9A9A" text-anchor="middle">
    <text x="150" y="522">D1</text>
    <text x="250" y="522">D2</text>
    <text x="350" y="522">D3</text>
    <text x="450" y="522">D4</text>
    <text x="550" y="522">D5</text>
    <text x="650" y="522">D6</text>
  </g>

  <!-- X-axis label -->
  <text x="400" y="545" font-family="sans-serif" font-size="12" fill="#6B6B6B" text-anchor="middle">Training Domains</text>

  <!-- ===================== EVENT MARKERS ===================== -->
  <!-- D2 Event Marker (σ_critical Triggered) -->
  <g transform="translate(250, 217.8)">
    <line x1="-10" y1="-10" x2="-14" y2="-14" stroke="#E05252" stroke-width="1.5" />
    <line x1="10" y1="-10" x2="14" y2="-14" stroke="#E05252" stroke-width="1.5" />
    <line x1="-10" y1="10" x2="-14" y2="14" stroke="#E05252" stroke-width="1.5" />
    <line x1="10" y1="10" x2="14" y2="14" stroke="#E05252" stroke-width="1.5" />
    <circle cx="0" cy="0" r="9" fill="#E05252" />
    <text x="0" y="-19" font-family="monospace" font-size="11" font-weight="bold" fill="#E05252" text-anchor="middle">
      σ<tspan baseline-shift="sub" font-size="9">A</tspan> > σ<tspan baseline-shift="sub" font-size="9">critical</tspan>
    </text>
  </g>

  <!-- D4 Event Marker (σ_critical Triggered) -->
  <g transform="translate(450, 240.6)">
    <line x1="-10" y1="-10" x2="-14" y2="-14" stroke="#E05252" stroke-width="1.5" />
    <line x1="10" y1="-10" x2="14" y2="-14" stroke="#E05252" stroke-width="1.5" />
    <line x1="-10" y1="10" x2="-14" y2="14" stroke="#E05252" stroke-width="1.5" />
    <line x1="10" y1="10" x2="14" y2="14" stroke="#E05252" stroke-width="1.5" />
    <circle cx="0" cy="0" r="9" fill="#E05252" />
    <text x="0" y="-19" font-family="monospace" font-size="11" font-weight="bold" fill="#E05252" text-anchor="middle">
      σ<tspan baseline-shift="sub" font-size="9">A</tspan> > σ<tspan baseline-shift="sub" font-size="9">critical</tspan>
    </text>
  </g>

  <!-- ===================== CAPTION ===================== -->
  <rect x="100" y="555" width="600" height="44" fill="#111111" rx="4"/>
  <text x="400" y="573" font-family="sans-serif" font-size="12" fill="#9A9A9A" text-anchor="middle">
    Representations: causal-structural features in upper layers of D2, D4
  </text>
  <text x="400" y="590" font-family="sans-serif" font-size="12" fill="#9A9A9A" text-anchor="middle">
    — first positive transfer T<tspan baseline-shift="sub" font-size="10">A</tspan> > 0 measurable to D1, D3
  </text>

  <!-- Cross-phase orientation indicator (Phase 2 = 3rd pip) -->
  <g transform="translate(400, 592)">
    <circle cx="-32" cy="0" r="4" fill="#3A3A3A" />
    <circle cx="-16" cy="0" r="4" fill="#3A3A3A" />
    <circle cx="0"   cy="0" r="4.5" fill="#F2F2F2" />
    <circle cx="16"  cy="0" r="4" fill="#3A3A3A" />
    <circle cx="32"  cy="0" r="4" fill="#3A3A3A" />
  </g>

</svg>
