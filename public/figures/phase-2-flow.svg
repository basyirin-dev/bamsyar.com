<!-- SYSTEM: axis-stroke #3A3A3A -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">

  <!-- Background -->
  <rect width="800" height="600" fill="#0D0D0D" />

  <defs>
    <!-- Arrowhead marker for flow lines -->
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 2 L 8 5 L 0 8 z" fill="#3A3A3A"/>
    </marker>
  </defs>

  <!-- Phase title -->
  <text x="40" y="45" fill="#F2F2F2" font-family="sans-serif" font-size="22" font-weight="bold">
    PHASE 2 <tspan fill="#CCCCCC" font-weight="normal">— Process Flow</tspan>
  </text>

  <!-- Trigger Subtitle (Aligned with Bar Chart) -->
  <text x="40" y="68" fill="#9A9A9A" font-family="sans-serif" font-size="14">
    Triggered: σ<tspan baseline-shift="sub" font-size="10">A</tspan>(d,t) > σ<tspan baseline-shift="sub" font-size="10">critical</tspan> in ≥1 mastery candidate
  </text>

  <!-- Legend / Glossary Block (Shared 4-row template) -->
  <rect x="560" y="25" width="220" height="100" fill="#111111" stroke="#3A3A3A" stroke-width="1" rx="4"/>
  <rect x="575" y="40" width="12" height="12" fill="#F4A823" rx="2"/>
  <text x="595" y="50" font-family="monospace" font-size="11" fill="#F2F2F2">δ Parametric depth</text>
  <rect x="575" y="60" width="12" height="12" fill="#264A7A" rx="2"/>
  <text x="595" y="70" font-family="monospace" font-size="11" fill="#F2F2F2">D* Delegation floor</text>
  <rect x="575" y="80" width="12" height="12" fill="#00FFFF" rx="2"/>
  <text x="595" y="90" font-family="monospace" font-size="11" fill="#F2F2F2">Ψ Intersection activation</text>
  <line x1="575" y1="105" x2="587" y2="105" stroke="#E8E8E8" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="595" y="109" font-family="monospace" font-size="11" fill="#F2F2F2">Δ(d,t) Frontier</text>

  <!-- Process Flow Diagram Badge -->
  <text x="780" y="145" fill="#3A3A3A" font-size="12" font-family="monospace" font-weight="bold" text-anchor="end" letter-spacing="1">[ PROCESS FLOW ]</text>

  <!-- ===================== CAUSAL CHAIN ===================== -->
  <g id="flowchart-content">

    <!-- Vertical Drop Connectors -->
    <g stroke="#3A3A3A" stroke-width="2.5" marker-end="url(#arrow)">
      <line x1="240" y1="176" x2="240" y2="226"/>
      <line x1="400" y1="297" x2="400" y2="347"/>
      <line x1="560" y1="418" x2="560" y2="468"/>
    </g>

    <!-- Node 1: Precondition (Added to complete the 4-step chain) -->
    <g id="step1">
      <rect x="40" y="110" width="240" height="66" rx="6" fill="#1A1A1A" stroke="#3A3A3A" stroke-width="1.5"/>
      <text x="160" y="137" fill="#F2F2F2" font-size="13" font-family="sans-serif" font-weight="bold" text-anchor="middle">Phase 1 Precondition</text>
      <text x="160" y="155" fill="#9A9A9A" font-size="12" font-family="sans-serif" text-anchor="middle">Depth accumulation in D2, D4</text>
    </g>

    <!-- Node 2: Sustained Investment -->
    <g id="step2">
      <rect x="200" y="231" width="240" height="66" rx="6" fill="#1A1A1A" stroke="#3A3A3A" stroke-width="1.5"/>
      <text x="320" y="258" fill="#F2F2F2" font-size="13" font-family="sans-serif" font-weight="bold" text-anchor="middle">Sustained depth investment</text>
      <text x="320" y="276" fill="#CCCCCC" font-size="12" font-family="sans-serif" text-anchor="middle">in candidate domains</text>
    </g>

    <!-- Node 3: Threshold Trigger -->
    <g id="step3">
      <rect x="360" y="352" width="240" height="66" rx="6" fill="#1A1A1A" stroke="#3A3A3A" stroke-width="1.5"/>
      <text x="480" y="379" fill="#F2F2F2" font-size="13" font-family="sans-serif" font-weight="bold" text-anchor="middle">σ<tspan baseline-shift="sub" font-size="10">critical</tspan> crossed</text>
      <text x="480" y="397" fill="#CCCCCC" font-size="12" font-family="sans-serif" text-anchor="middle">learning rate multiplier activates</text>
    </g>

    <!-- Node 4: Transfer Mechanism -->
    <g id="step4">
      <rect x="520" y="473" width="240" height="66" rx="6" fill="#1A1A1A" stroke="#E8940A" stroke-width="2"/>
      <text x="640" y="493" fill="#E8940A" font-size="13" font-family="sans-serif" font-weight="bold" text-anchor="middle">Cross-domain transfer activates</text>
      <text x="640" y="511" fill="#F2F2F2" font-size="12" font-family="sans-serif" text-anchor="middle">(T<tspan baseline-shift="sub" font-size="9">A</tspan> > 0) — adjacent domains</text>
      <text x="640" y="527" fill="#F2F2F2" font-size="12" font-family="sans-serif" text-anchor="middle">gain depth passively</text>
    </g>
  </g>

  <!-- ===================== CAPTION ===================== -->
  <rect x="100" y="555" width="600" height="44" fill="#111111" rx="4"/>
  <text x="400" y="573" font-family="sans-serif" font-size="12" fill="#9A9A9A" text-anchor="middle">
    Representations: causal-structural features in upper layers of D2, D4
  </text>
  <text x="400" y="590" font-family="sans-serif" font-size="12" fill="#9A9A9A" text-anchor="middle">
    — first positive transfer T<tspan baseline-shift="sub" font-size="10">A</tspan> > 0 measurable to D1, D3
  </text>

</svg>
