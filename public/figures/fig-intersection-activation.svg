<text x="350" y="225" font-family="monospace" font-size="9" fill="#E8E8E8" text-anchor="middle" opacity="0.60">φ=0.82</text>
<line x1="342" y1="229" x2="358" y2="229" stroke="#E8E8E8" stroke-width="0.7" opacity="0.30"/>

