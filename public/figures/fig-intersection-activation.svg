<text x="30" y="57" font-family="sans-serif" font-size="12" fill="#9A9A9A">Ψ fires when σ(d₁) and σ(d₂) both exceed θ<tspan baseline-shift="-30%" font-size="9">I</tspan> — generating capability neither domain produces alone</text>
