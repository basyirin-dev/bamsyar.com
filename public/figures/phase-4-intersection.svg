  <rect x="575" y="40" width="12" height="12" fill="#F4A823" rx="2"/>
  <text x="595" y="50" font-family="'Courier New', Courier, monospace" font-size="11" fill="#F2F2F2">δ Parametric depth</text>
  <rect x="575" y="60" width="12" height="12" fill="#264A7A" rx="2"/>
  <text x="595" y="70" font-family="'Courier New', Courier, monospace" font-size="11" fill="#F2F2F2">D* Delegation floor</text>
