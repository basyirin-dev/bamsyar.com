    <rect x="67.5" y="515" width="200" height="26" rx="13" fill="#0D2A1A" stroke="#2ECC71" stroke-width="1" />
    <text x="167.5" y="533" fill="#2ECC71" font-size="13" font-weight="bold" font-family="'Segoe UI', Arial, sans-serif" text-anchor="middle">Compositional test: PASS ✓</text>
