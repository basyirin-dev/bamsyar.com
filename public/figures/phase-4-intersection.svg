<!-- SYSTEM: axis-stroke #3A3A3A -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <!-- Corrected gradient: Bottom (y1=1) to Top (y2=0) -->
    <linearGradient id="d3Gradient" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#4A4A4A" />
      <stop offset="100%" stop-color="#E8940A" />
    </linearGradient>

    <!-- Standardized Arc Markers -->
    <marker id="dotArc" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <circle cx="5" cy="5" r="3" fill="#7EC8E3" />
    </marker>
    <marker id="arrowPsi" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7EC8E3" />
    </marker>
  </defs>

  <!-- Background -->
