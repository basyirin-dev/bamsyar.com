    <text x="435" y="235" fill="#777777" font-size="12" font-family="'Segoe UI', Arial, sans-serif">Frontier Δ(d,t)</text>

    <line x1="430" y1="340" x2="770" y2="340" stroke="#555555" stroke-width="1.5" stroke-dasharray="8,4" />
    <text x="435" y="335" fill="#555555" font-size="12" font-family="'Segoe UI', Arial, sans-serif">Mastery threshold</text>

    <!-- Base Bars -->
    <rect x="440" y="402" width="35" height="78" fill="#4A4A4A" rx="2" />
    <rect x="495" y="189" width="35" height="291" fill="#4A4A4A" rx="2" />
    <rect x="550" y="336" width="35" height="144" fill="#4A4A4A" rx="2" />
    <rect x="605" y="198" width="35" height="282" fill="#4A4A4A" rx="2" />
    <rect x="660" y="405" width="35" height="75" fill="#4A4A4A" rx="2" />
    <rect x="715" y="426" width="35" height="54" fill="#4A4A4A" rx="2" />

    <!-- Delegation Overlays -->
    <g fill="#1C3A5E" fill-opacity="0.85">
      <rect x="440" y="402" width="35" height="78" rx="2" />
      <rect x="495" y="300" width="35" height="180" rx="2" />
      <rect x="550" y="336" width="35" height="144" rx="2" />
      <rect x="605" y="306" width="35" height="174" rx="2" />
      <rect x="660" y="405" width="35" height="75" rx="2" />
      <rect x="715" y="426" width="35" height="54" rx="2" />
    </g>

    <!-- Domain Labels -->
    <g fill="#9A9A9A" font-size="14" font-family="'Courier New', Courier, monospace" font-weight="bold" text-anchor="middle">
      <text x="457.5" y="495">D1</text>
      <text x="512.5" y="495">D2</text>
      <text x="567.5" y="495" fill="#FFFFFF">D3</text>
      <text x="622.5" y="495">D4</text>
      <text x="677.5" y="495">D5</text>
      <text x="732.5" y="495">D6</text>
    </g>

    <!-- Activation Failure X Marker -->
    <path d="M 557.5 305 L 577.5 325 M 577.5 305 L 557.5 325" stroke="#E05252" stroke-width="2" />
    <text x="567.5" y="295" fill="#E05252" font-size="12" font-weight="bold" font-family="'Segoe UI', Arial, sans-serif" text-anchor="middle">Ψ = 0 (σ insufficient)</text>
    <line x1="567.5" y1="325" x2="567.5" y2="336" stroke="#E05252" stroke-width="1.5" stroke-dasharray="3,3" />

    <!-- Outcome Box -->
