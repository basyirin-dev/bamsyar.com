  <text x="595" y="90" font-family="'Courier New', Courier, monospace" font-size="11" fill="#F2F2F2">Ψ Intersection activation</text>
  <line x1="575" y1="105" x2="587" y2="105" stroke="#E8E8E8" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="595" y="109" font-family="'Courier New', Courier, monospace" font-size="11" fill="#F2F2F2">Δ(d,t) Frontier</text>
  <rect x="575" y="117" width="5" height="12" fill="#F4A823" rx="1"/>
  <rect x="582" y="117" width="5" height="12" fill="#4A4A4A" rx="1"/>
  <text x="595" y="127" font-family="'Courier New', Courier, monospace" font-size="11" fill="#F2F2F2">Agent A vs B Depth</text>

