      <line x1="25" y1="192" x2="30" y2="192" />
      <line x1="25" y1="264" x2="30" y2="264" />
      <line x1="25" y1="336" x2="30" y2="336" />
      <line x1="25" y1="408" x2="30" y2="408" />
