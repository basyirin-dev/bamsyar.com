    <text x="567.5" y="533" fill="#E05252" font-size="13" font-weight="bold" font-family="'Segoe UI', Arial, sans-serif" text-anchor="middle">Compositional test: FAIL ✗</text>
  </g>

  <!-- ===================== CAPTION ===================== -->
  <rect x="100" y="555" width="600" height="44" fill="#111111" rx="4"/>
  <text x="400" y="581" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#9A9A9A" text-anchor="middle">
    Identical δ. Identical training time. σ alone determines Ψ activation and compositional test outcome.
  </text>

  <!-- Cross-phase orientation indicator (Phase 4 = 5th pip) -->
  <g transform="translate(400, 592)">
    <circle cx="-32" cy="0" r="4" fill="#3A3A3A" />
    <circle cx="-16" cy="0" r="4" fill="#3A3A3A" />
    <circle cx="0"   cy="0" r="4" fill="#3A3A3A" />
    <circle cx="16"  cy="0" r="4" fill="#3A3A3A" />
    <circle cx="32"  cy="0" r="4.5" fill="#F2F2F2" />
  </g>

</svg>
