    <rect x="95" y="189" width="35" height="291" fill="#FF6B1A" rx="2" />
    <rect x="150" y="336" width="35" height="144" fill="url(#d3Gradient)" rx="2" />
    <rect x="205" y="198" width="35" height="282" fill="#F4A823" rx="2" />
    <rect x="260" y="405" width="35" height="75" fill="#4A4A4A" rx="2" />
    <rect x="315" y="426" width="35" height="54" fill="#4A4A4A" rx="2" />

