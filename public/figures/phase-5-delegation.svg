<!-- SYSTEM: axis-stroke #3A3A3A -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Definitions for Gradients, Markers, and Filters -->
  <defs>
    <!-- Mastery & Intersection Gradients -->
    <linearGradient id="gradMastery" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#8B5E3C" />
      <stop offset="100%" stop-color="#FF6B1A" />
    </linearGradient>

    <linearGradient id="gradIntersection" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#4A4A4A" />
      <stop offset="50%" stop-color="#8B5E3C" />
      <stop offset="100%" stop-color="#E8940A" />
    </linearGradient>

    <!-- Edge-Fading Ghost Bar Gradients -->
    <linearGradient id="fadeLeft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent" />
      <stop offset="100%" stop-color="#2A2A2A" />
    </linearGradient>

    <linearGradient id="fadeRight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2A2A2A" />
      <stop offset="100%" stop-color="transparent" />
    </linearGradient>

    <!-- Dynamic Glow for Frontier -->
    <filter id="frontierGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Arrowhead for Ψ Arcs -->
    <marker id="arrowPsi" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7EC8E3" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#0D0D0D" />

  <!-- Global Titles -->
  <text x="40" y="45" fill="#F2F2F2" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="bold">
    PHASE 5 <tspan fill="#CCCCCC" font-weight="normal">— The Expanding Frontier</tspan>
  </text>
  <text x="40" y="68" fill="#9A9A9A" font-family="'Segoe UI', Arial, sans-serif" font-size="14">
    No terminal trigger — boundary advances continuously
  </text>

  <!-- Legend / Glossary Block (Shared Template + Schema Gradient Row) -->
  <rect x="540" y="25" width="240" height="125" fill="#111111" stroke="#3A3A3A" stroke-width="1" rx="4"/>
  <rect x="555" y="40" width="12" height="12" fill="#F4A823" rx="2"/>
  <text x="575" y="50" font-family="'Courier New', Courier, monospace" font-size="11" fill="#F2F2F2">δ Parametric depth</text>

  <rect x="555" y="60" width="12" height="12" fill="url(#gradMastery)" rx="2"/>
  <text x="575" y="70" font-family="'Courier New', Courier, monospace" font-size="11" fill="#F2F2F2">Schema-rich mastery depth</text>

  <rect x="555" y="80" width="12" height="12" fill="#264A7A" rx="2"/>
  <text x="575" y="90" font-family="'Courier New', Courier, monospace" font-size="11" fill="#F2F2F2">D* Delegation floor</text>

  <rect x="555" y="100" width="12" height="12" fill="#00FFFF" rx="2"/>
  <text x="575" y="110" font-family="'Courier New', Courier, monospace" font-size="11" fill="#F2F2F2">Ψ Intersection activation</text>

  <line x1="555" y1="125" x2="567" y2="125" stroke="#E8E8E8" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="575" y="129" font-family="'Courier New', Courier, monospace" font-size="11" fill="#F2F2F2">Δ(d,t) Frontier</text>

  <!-- Y-Axis Label and Ticks -->
  <text transform="rotate(-90)" x="-310" y="35" fill="#6B6B6B" font-family="'Segoe UI', Arial, sans-serif" font-size="14" text-anchor="middle">Parametric Depth (δ)</text>

  <line x1="100" y1="120" x2="100" y2="500" stroke="#3A3A3A" stroke-width="1.5" />
  <line x1="100" y1="500" x2="700" y2="500" stroke="#3A3A3A" stroke-width="1.5" />

  <g stroke="#3A3A3A" stroke-width="1.5">
    <line x1="95" y1="120" x2="100" y2="120" />
    <line x1="95" y1="196" x2="100" y2="196" />
    <line x1="95" y1="272" x2="100" y2="272" />
    <line x1="95" y1="348" x2="100" y2="348" />
    <line x1="95" y1="424" x2="100" y2="424" />
    <line x1="95" y1="500" x2="100" y2="500" />
  </g>

  <g fill="#9A9A9A" font-family="'Courier New', Courier, monospace" font-size="13" text-anchor="end">
    <text x="85" y="124">1.0</text>
    <text x="85" y="200">0.8</text>
    <text x="85" y="276">0.6</text>
    <text x="85" y="352">0.4</text>
    <text x="85" y="428">0.2</text>
    <text x="85" y="504">0.0</text>
  </g>

  <!-- Adjacent Possible Domains (Ghost Bars with Fade Gradients) -->
  <rect x="50" y="320" width="28" height="180" fill="url(#fadeLeft)" stroke="#4A4A4A" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.8" />
  <text transform="translate(64, 410) rotate(-90)" fill="#7A7A7A" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Adjacent Possible</text>

  <rect x="722" y="300" width="28" height="200" fill="url(#fadeRight)" stroke="#4A4A4A" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.8" />
  <text transform="translate(736, 400) rotate(90)" fill="#7A7A7A" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Adjacent Possible</text>

  <!-- Mastery Threshold -->
  <line x1="100" y1="272" x2="700" y2="272" stroke="#6B6B6B" stroke-width="1.5" stroke-dasharray="8,4" />
  <rect x="106" y="264" width="120" height="16" fill="#0D0D0D" />
  <text x="108" y="276" fill="#6B6B6B" font-family="'Segoe UI', Arial, sans-serif" font-size="12" text-anchor="start">Mastery threshold</text>

  <!-- The Frontier Line (Smooth cubic bezier with glow filter) -->
  <path d="M 100 140 C 130 135 170 122 250 115 C 300 110 320 108 350 118 C 380 128 400 105 450 112 C 500 120 550 130 600 118 C 650 106 680 115 700 110" fill="none" stroke="#E8E8E8" stroke-width="1.5" stroke-dasharray="8,4" filter="url(#frontierGlow)" />
  <text x="710" y="112" fill="#E8E8E8" font-family="'Segoe UI', Arial, sans-serif" font-size="12" text-anchor="start">Frontier Δ(d,t) — advancing</text>

  <!-- ===================== BARS ===================== -->
  <!-- Aligned strictly to the 68px width grid standard -->
  <rect x="116" y="320" width="68" height="180" fill="#4A4A4A" rx="2" /> <!-- D1 -->
  <rect x="216" y="138" width="68" height="362" fill="url(#gradMastery)" rx="2" /> <!-- D2 -->
  <rect x="316" y="210" width="68" height="290" fill="url(#gradIntersection)" rx="2" /> <!-- D3 -->
  <rect x="416" y="143" width="68" height="357" fill="url(#gradMastery)" rx="2" /> <!-- D4 -->
  <rect x="516" y="295" width="68" height="205" fill="#4A4A4A" rx="2" /> <!-- D5 -->
  <rect x="616" y="340" width="68" height="160" fill="#4A4A4A" rx="2" /> <!-- D6 -->

  <!-- ===================== DELEGATION FLOORS ===================== -->
  <g fill="#1C3A5E" opacity="0.85">
    <rect x="124" y="440" width="52" height="60" rx="2" />
    <rect x="224" y="472" width="52" height="28" rx="2" />
    <rect x="324" y="455" width="52" height="45" rx="2" />
    <rect x="424" y="470" width="52" height="30" rx="2" />
    <rect x="524" y="435" width="52" height="65" rx="2" />
    <rect x="624" y="430" width="52" height="70" rx="2" />
  </g>

  <!-- Delegation boundary lines -->
  <g stroke="#2E5F9E" stroke-width="2" stroke-linecap="square">
    <line x1="124" y1="440" x2="176" y2="440" />
    <line x1="224" y1="472" x2="276" y2="472" />
    <line x1="324" y1="455" x2="376" y2="455" />
    <line x1="424" y1="470" x2="476" y2="470" />
    <line x1="524" y1="435" x2="576" y2="435" />
    <line x1="624" y1="430" x2="676" y2="430" />
  </g>

  <!-- D2 explicit delegation floor marker -->
  <text x="250" y="488" fill="#2E5F9E" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle">D*=9%</text>

  <!-- ===================== DOMAIN X-AXIS LABELS ===================== -->
  <g stroke="#3A3A3A" stroke-width="1.5">
    <line x1="150" y1="500" x2="150" y2="505" />
    <line x1="250" y1="500" x2="250" y2="505" />
    <line x1="350" y1="500" x2="350" y2="505" />
    <line x1="450" y1="500" x2="450" y2="505" />
    <line x1="550" y1="500" x2="550" y2="505" />
    <line x1="650" y1="500" x2="650" y2="505" />
  </g>

  <g fill="#CCCCCC" font-family="'Courier New', Courier, monospace" font-size="14" font-weight="bold" text-anchor="middle">
    <text x="150" y="522">D1</text>
    <text x="250" y="522">D2</text>
    <text x="350" y="522">D3</text>
    <text x="450" y="522">D4</text>
    <text x="550" y="522">D5</text>
    <text x="650" y="522">D6</text>
  </g>
  <text x="400" y="545" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#6B6B6B" text-anchor="middle">Training Domains</text>

  <!-- ===================== Ψ ARCS (Active, Solid) ===================== -->
  <!-- Mathematical apex calculation: cy = (apex_height - 0.25*y1 - 0.25*y2) / 0.5 -->

  <!-- Ψ₁: D2 to D3 (Apex explicitly at y=90) -->
  <path d="M 250 138 Q 300 6 350 210" fill="none" stroke="#7EC8E3" stroke-width="2" marker-end="url(#arrowPsi)" />
  <rect x="288" y="78" width="24" height="14" fill="#0D0D0D" rx="2" />
  <text x="300" y="89" fill="#7EC8E3" font-family="'Segoe UI', Arial, sans-serif" font-weight="bold" font-size="11" text-anchor="middle">Ψ₁</text>

  <!-- Ψ₂: D4 to D3 (Apex explicitly at y=65) -->
  <path d="M 450 143 Q 400 -46.5 350 210" fill="none" stroke="#7EC8E3" stroke-width="2" marker-end="url(#arrowPsi)" />
  <rect x="388" y="53" width="24" height="14" fill="#0D0D0D" rx="2" />
  <text x="400" y="64" fill="#7EC8E3" font-family="'Segoe UI', Arial, sans-serif" font-weight="bold" font-size="11" text-anchor="middle">Ψ₂</text>

  <!-- Ψ₃: D2 to D4 (Long Span, Apex explicitly at y=40, Thicker stroke) -->
  <path d="M 250 138 Q 350 -60.5 450 143" fill="none" stroke="#7EC8E3" stroke-width="3" marker-end="url(#arrowPsi)" />
  <rect x="338" y="28" width="24" height="14" fill="#0D0D0D" rx="2" />
  <text x="350" y="39" fill="#7EC8E3" font-family="'Segoe UI', Arial, sans-serif" font-weight="bold" font-size="11" text-anchor="middle">Ψ₃</text>

  <!-- ===================== ANNOTATION BOX ===================== -->
  <!-- Positioned safely in the right-side whitespace above D5/D6 -->
  <rect x="500" y="165" width="220" height="110" rx="6" fill="#1A1A1A" stroke="#3A3A3A" stroke-width="1" />
  <text x="515" y="195" fill="#F4A823" font-family="'Courier New', Courier, monospace" font-size="13">δ ≈ frontier (D2, D4)</text>
  <text x="515" y="215" fill="#F4A823" font-family="'Courier New', Courier, monospace" font-size="13">σ = 0.91 — 0.94</text>
  <text x="515" y="235" fill="#F4A823" font-family="'Courier New', Courier, monospace" font-size="13">D* = 8% — 12%</text>
  <text x="515" y="255" fill="#F4A823" font-family="'Courier New', Courier, monospace" font-size="13">Ψ active: 3 intersections</text>

  <!-- ===================== CAPTION ===================== -->
  <rect x="100" y="555" width="600" height="44" fill="#111111" rx="4"/>
  <text x="400" y="581" fill="#9A9A9A" font-family="'Segoe UI', Arial, sans-serif" font-size="12" text-anchor="middle">
    The perimeter grows with the area — greater depth reveals greater adjacent ignorance
  </text>

</svg>
